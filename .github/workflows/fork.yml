name: Fork ImmortalWrt to My Repo

on:
  workflow_dispatch:

jobs:
  fork:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout your repo
      uses: actions/checkout@v4

    - name: Set up Git identity
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Clone ImmortalWrt official repo
      run: |
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git -b openwrt-24.10 upstream

    - name: Push to your repo as new branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_REPO: ${{ github.repository }}
      run: |
        BRANCH="build/sl3000-$(date +%Y%m%d-%H%M%S)"
        git clone upstream forked
        cd forked
        git checkout -b "$BRANCH"
        git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git"
        git add .
        git commit -m "Forked ImmortalWrt openwrt-24.10"
        git push origin "$BRANCH"
