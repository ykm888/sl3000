name: Sync ImmortalWrt 24.10

on:
  workflow_dispatch:   # 手动触发
  schedule:
    - cron: '0 3 * * *'   # 每天凌晨 3 点自动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout self repo
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream ImmortalWrt
        run: |
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git
          git fetch upstream v24.10

      - name: Sync branch
        run: |
          git checkout -B immortalwrt-24.10 upstream/v24.10
          git push origin immortalwrt-24.10 --force
