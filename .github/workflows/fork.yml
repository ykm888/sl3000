name: ImmortalWrt 24.10 Sync & Build

on:
  workflow_dispatch:   # 手动触发
  schedule:
    - cron: '0 3 * * *'   # 每天凌晨 3 点自动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout self repo
        uses: actions/checkout@v4

      - name: Set up Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream ImmortalWrt
        run: |
          git remote add upstream https://github.com/immortalwrt/immortalwrt.git
          git fetch upstream openwrt-24.10

      - name: Sync branch
        run: |
          git checkout -B immortalwrt-24.10 upstream/openwrt-24.10
          git push origin immortalwrt-24.10 --force

  build:
    runs-on: ubuntu-latest
    needs: sync

    steps:
      - name: Checkout synced branch
        uses: actions/checkout@v4
        with:
          ref: immortalwrt-24.10

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison g++ gawk gcc-multilib \
            g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Default config
        run: |
          make defconfig

      - name: Build firmware
        run: |
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-firmware
          path: bin/targets/
