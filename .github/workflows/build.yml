name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: immortalwrt-24.10   # 拉起你仓库的 24.10 分支

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3 python3-pip python3-setuptools ccache perl pkg-config \
          libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Prepare SL3000 (三件套对齐)
      run: |
        set -e
        cd $GITHUB_WORKSPACE

        echo "===== DTS 放置到正确目录 ====="
        cp -f target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/mt7981b-sl3000-emmc.dts \
              /home/runner/immortalwrt/target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/

        echo "===== MK 放置到正确目录 ====="
        cp -f target/linux/mediatek/image/filogic.mk \
              /home/runner/immortalwrt/target/linux/mediatek/image/

        echo "===== config 放置到根目录 ====="
        cp -f .config /home/runner/immortalwrt/.config

        cd /home/runner/immortalwrt

        echo "===== DTS 注册兜底 ====="
        grep -q "mt7981b-sl3000-emmc.dtb" target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/Makefile || \
          echo "dtb-y += mt7981b-sl3000-emmc.dtb" >> target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/Makefile

        echo "===== MK 补齐兜底 ====="
        grep -q "define Device/sl3000" target/linux/mediatek/image/filogic.mk || {
          cat >> target/linux/mediatek/image/filogic.mk <<'EOF'
define Device/sl3000
  DEVICE_VENDOR := SL
  DEVICE_MODEL := 3000
  DEVICE_DTS := mt7981b-sl3000-emmc
  IMAGE_SIZE := 268435456
endef
TARGET_DEVICES += sl3000
EOF
        }

        echo "===== feeds 更新 ====="
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        echo "===== 强制目标与设备 ====="
        grep -q "CONFIG_TARGET_mediatek=y" .config || echo "CONFIG_TARGET_mediatek=y" >> .config
        grep -q "CONFIG_TARGET_mediatek_filogic=y" .config || echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" .config || echo "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" >> .config

        echo "===== 运行 defconfig ====="
        make defconfig

        echo "===== defconfig 后断言 ====="
        grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" .config || { echo "FATAL: sl3000 missing AFTER defconfig"; exit 1; }

    - name: Build firmware
      run: |
        cd /home/runner/immortalwrt
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"

        make -j$(nproc) V=s || make -j1 V=s

    - name: Generate SHA256 checksums
      run: |
        cd /home/runner/immortalwrt/bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/*
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/SHA256SUMS