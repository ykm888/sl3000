name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: immortalwrt-24.10

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3 python3-pip python3-setuptools ccache perl pkg-config \
          libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Clean build cache
      run: |
        make clean || true
        rm -rf tmp/ staging_dir/ build_dir/

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: dl
        key: "dl-${{ runner.os }}"
        restore-keys: |
          dl-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: "ccache-${{ runner.os }}-${{ github.run_id }}"
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Force override filogic.mk (关键修复)
      run: |
        echo "===== 覆盖 filogic.mk，确保 sl3000 设备定义生效 ====="
        cp sl3000/target/linux/mediatek/image/filogic.mk target/linux/mediatek/image/filogic.mk
        echo "===== 覆盖完成 ====="

    - name: Patch auto-check + config repair
      run: |
        set -e

        echo "===== Patch 自动检测 ====="
        PATCH_DIR="target/linux/mediatek/patches-6.6"
        if [ -d "$PATCH_DIR" ]; then
          for p in "$PATCH_DIR"/*.patch; do
            [ -e "$p" ] || continue
            patch -p1 --dry-run < "$p" || {
              echo "Patch $p 不兼容，已禁用"
              mv "$p" "$p.disabled"
            }
          done
        fi

        echo "===== config 自动修复（仅修复 target）====="
        grep -q "CONFIG_TARGET_MEDIATEK=y" .config || echo "CONFIG_TARGET_MEDIATEK=y" >> .config
        grep -q "CONFIG_TARGET_MEDIATEK_FILOGIC=y" .config || echo "CONFIG_TARGET_MEDIATEK_FILOGIC=y" >> .config
        grep -q "CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000=y" .config || echo "CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000=y" >> .config

        echo "===== feeds 更新 ====="
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        echo "===== defconfig + 断言 ====="
        make defconfig
        grep -q "CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000=y" .config || {
          echo "FATAL: sl3000 missing AFTER defconfig"
          exit 1
        }

    - name: Build firmware
      run: |
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        ccache -C || true

        echo "===== 编译固件（失败自动重试）====="
        make -j$(nproc) V=s || make -j1 V=s

        df -h
        ccache -s || true

    - name: Generate SHA256 checksums
      run: |
        cd bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "sl3000-${{ github.run_number }}"
        name: "SL3000 Firmware Build #${{ github.run_number }}"
        body: |
          自动构建固件（SL3000 / ImmortalWrt 24.10）
          🔧 自动覆盖 filogic.mk（确保 sl3000 设备定义生效）
          🔧 patch 自动检测并禁用不兼容项
          🔧 .config 自动修复 target
          🔧 defconfig 后强校验目标设备
          🔧 编译失败自动重试
          🔧 缓存加速（dl + ccache）
          🔧 自动生成 SHA256 校验文件
          🔧 自动发布 GitHub Release
        files: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS