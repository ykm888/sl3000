name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
          file wget python3 python3-pip ccache perl pkg-config libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Clone ImmortalWrt
      run: |
        rm -rf /home/runner/immortalwrt
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git \
          -b openwrt-24.10 /home/runner/immortalwrt

    - name: Copy SL3000 config/dts/mk
      run: |
        set -e
        cp -f "$GITHUB_WORKSPACE/.config" /home/runner/immortalwrt/.config || true
        mkdir -p /home/runner/immortalwrt/target/linux/mediatek/dts
        cp -f "$GITHUB_WORKSPACE/dts/mt7981b-sl3000-emmc.dts" \
              /home/runner/immortalwrt/target/linux/mediatek/dts/ || true
        mkdir -p /home/runner/immortalwrt/target/linux/mediatek/image
        cp -f "$GITHUB_WORKSPACE/image/filogic.mk" \
              /home/runner/immortalwrt/target/linux/mediatek/image/ || true

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: /home/runner/immortalwrt/dl
        key: "dl-${{ runner.os }}"
        restore-keys: |
          dl-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: "ccache-${{ runner.os }}-${{ github.run_id }}"
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Prepare SL3000 (注册设备 + 兜底补齐 + 双断言)
      run: |
        set -e
        cd /home/runner/immortalwrt

        echo "===== 验证三件套存在性 ====="
        test -f .config || { echo "FATAL: .config missing"; exit 1; }
        test -f target/linux/mediatek/dts/mt7981b-sl3000-emmc.dts || { echo "FATAL: DTS missing"; exit 1; }
        test -f target/linux/mediatek/image/filogic.mk || { echo "FATAL: MK missing"; exit 1; }

        echo "===== DTS 注册兜底 ====="
        grep -q "mt7981b-sl3000-emmc.dtb" target/linux/mediatek/Makefile || \
          echo "dtb-y += mt7981b-sl3000-emmc.dtb" >> target/linux/mediatek/Makefile

        echo "===== 设备定义兜底（确保 Device/sl3000 存在）====="
        if ! grep -q "define Device/sl3000" target/linux/mediatek/image/filogic.mk; then
          cat >> target/linux/mediatek/image/filogic.mk <<'EOF'
define Device/sl3000
  DEVICE_VENDOR := SL
  DEVICE_MODEL := 3000
  DEVICE_DTS := mt7981b-sl3000-emmc
  SUPPORTED_DEVICES := sl3000
  IMAGE_SIZE := 268435456

  DEVICE_PACKAGES := \
    kmod-mt7981-firmware \
    kmod-mt76 \
    kmod-mt76-core \
    kmod-mt76-connac \
    wpad-basic-mbedtls \
    iwinfo \
    kmod-leds-gpio \
    kmod-gpio-button-hotplug \
    kmod-mediatek_eth \
    kmod-mediatek_hnat \
    kmod-mt7531 \
    block-mount \
    kmod-fs-ext4 \
    kmod-mmc \
    kmod-mmc-mtk \
    e2fsprogs \
    kmod-nls-base \
    dnsmasq-full \
    ppp \
    ppp-mod-pppoe \
    uhttpd \
    uhttpd-mod-ubus \
    libustream-mbedtls \
    rpcd \
    rpcd-mod-rrdns \
    luci \
    luci-base \
    luci-mod-admin-full \
    luci-theme-bootstrap \
    luci-app-opkg \
    luci-ssl \
    luci-i18n-base-zh-cn
endef
EOF
        fi
        grep -q "TARGET_DEVICES += sl3000" target/linux/mediatek/image/filogic.mk || \
          echo "TARGET_DEVICES += sl3000" >> target/linux/mediatek/image/filogic.mk

        echo "===== feeds 更新（警告非致命，确保成功返回）====="
        ./scripts/feeds update -a || { echo "FATAL: feeds update failed"; exit 1; }
        ./scripts/feeds install -a || { echo "FATAL: feeds install failed"; exit 1; }

        echo "===== 强制目标与子目标（不强塞设备符号）====="
        grep -q "CONFIG_TARGET_mediatek=y" .config || echo "CONFIG_TARGET_mediatek=y" >> .config
        grep -q "CONFIG_TARGET_mediatek_filogic=y" .config || echo "CONFIG_TARGET_mediatek_filogic=y" >> .config

        echo "===== defconfig 前断言 ====="
        grep -Eq "CONFIG_TARGET_mediatek=y" .config || { echo "FATAL: mediatek target missing BEFORE defconfig"; exit 1; }
        grep -Eq "CONFIG_TARGET_mediatek_filogic=y" .config || { echo "FATAL: filogic subtarget missing BEFORE defconfig"; exit 1; }
        grep -q "define Device/sl3000" target/linux/mediatek/image/filogic.mk || { echo "FATAL: Device/sl3000 block missing BEFORE defconfig"; exit 1; }
        grep -q "TARGET_DEVICES += sl3000" target/linux/mediatek/image/filogic.mk || { echo "FATAL: TARGET_DEVICES sl3000 missing BEFORE defconfig"; exit 1; }

        echo "===== 运行 defconfig ====="
        make defconfig

        echo "===== defconfig 后断言（设备符号）====="
        # 兼容两种命名形式
        if ! grep -Eq "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_sl3000=y|CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000=y" .config; then
          echo "FATAL: sl3000 device missing AFTER defconfig"
          echo "Hint: 如果仍失败，打印 .config 与 filogic.mk 以确认名称一致。"
          exit 1
        fi

        echo "===== 打印关键配置快照 ====="
        grep -E "CONFIG_TARGET_mediatek|CONFIG_TARGET_mediatek_filogic" .config || true
        grep -E "CONFIG_TARGET_DEVICE_mediatek_filogic_DEVICE_sl3000|CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000" .config || true

    - name: Build firmware
      run: |
        set -e
        cd /home/runner/immortalwrt
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"

        make defconfig
        make -j$(nproc) V=s || make -j1 V=s

        df -h
        ccache -s || true

    - name: Generate SHA256 checksums
      run: |
        cd /home/runner/immortalwrt/bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/*
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/SHA256SUMS

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "sl3000-${{ github.run_number }}"
        name: "SL3000 Firmware Build #${{ github.run_number }}"
        body: |
          自动构建固件（SL3000 / ImmortalWrt 24.10）
          - 自动验证并修复三件套（.config/DTS/MK）
          - DTS 自动注册 + 兜底补齐 Device/sl3000
          - 只强制 target/subtarget，设备符号由 MK 正确生成
          - defconfig 前后双断言防止回落
          - 自动生成 SHA256 校验文件
        files: |
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/*
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/SHA256SUMS