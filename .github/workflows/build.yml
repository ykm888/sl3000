name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: immortalwrt-24.10

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3 python3-pip python3-setuptools ccache perl pkg-config \
          libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Clean build cache
      run: |
        make clean || true
        rm -rf tmp/ staging_dir/ build_dir/

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: dl
        key: "dl-${{ runner.os }}"
        restore-keys: |
          dl-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: "ccache-${{ runner.os }}-${{ github.run_id }}"
        restore-keys: |
          ccache-${{ runner.os }}-

    # ============================================================
    # 自动检测三件套 + 自动检测 DTS 内容 + 自动修复 config
    # ============================================================
    - name: Auto-check DTS + MK + CONFIG
      run: |
        set -e

        echo "===== 检查 DTS 文件 ====="
        DTS=target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/mt7981-sl3000-emmc.dts
        if [ ! -f "$DTS" ]; then
          echo "FATAL: DTS 文件不存在: $DTS"
          exit 1
        fi
        echo "DTS 文件存在 OK"

        echo "===== 检查 DTS: mt7981b-soc ====="
        if ! grep -q "mt7981b" "$DTS"; then
          echo "WARNING: DTS 未包含 mt7981b-soc"
        else
          echo "DTS compatible OK"
        fi

        echo "===== 检查 DTS: memory 1GB ====="
        if ! grep -q "memory" "$DTS"; then
          echo "WARNING: DTS 未定义 memory 节点"
        fi

        echo "===== 检查 DTS: eMMC 节点 ====="
        if ! grep -q "mmc" "$DTS"; then
          echo "WARNING: DTS 未定义 eMMC 节点"
        fi

        echo "===== 检查 DTS: SPI-NOR ====="
        if ! grep -q "spi" "$DTS"; then
          echo "WARNING: DTS 未定义 SPI-NOR 节点"
        fi

        echo "===== 检查 DTS: ethernet ====="
        if ! grep -q "ethernet" "$DTS"; then
          echo "WARNING: DTS 未定义 ethernet 节点"
        fi

        echo "===== 检查 DTS: switch ====="
        if ! grep -q "switch" "$DTS"; then
          echo "WARNING: DTS 未定义 switch 节点"
        fi

        echo "===== 检查 DTS: gpio-leds ====="
        if ! grep -q "gpio-leds" "$DTS"; then
          echo "WARNING: DTS 未定义 gpio-leds"
        fi

        echo "===== 检查 DTS: gpio-keys ====="
        if ! grep -q "gpio-keys" "$DTS"; then
          echo "WARNING: DTS 未定义 gpio-keys"
        fi

        echo "===== 检查 filogic.mk ====="
        MK=target/linux/mediatek/image/filogic.mk

        if grep -q "define Device/" "$MK" | grep -v sl3000; then
          echo "FATAL: filogic.mk 中存在非 sl3000 设备定义"
          exit 1
        fi

        if ! grep -q "Device/sl3000" "$MK"; then
          echo "FATAL: filogic.mk 未定义 sl3000"
          exit 1
        fi

        if ! grep -q "TARGET_DEVICES += sl3000" "$MK"; then
          echo "FATAL: filogic.mk 未添加 sl3000 到 TARGET_DEVICES"
          exit 1
        fi

        echo "===== 自动修复 config ====="
        echo "CONFIG_TARGET_mediatek=y" > .config
        echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        echo "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" >> .config
        echo "config OK"

    - name: Feeds + defconfig + 强校验
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        echo "===== defconfig ====="
        make defconfig

        echo "===== 校验 sl3000 是否存在 ====="
        if ! grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" .config; then
          echo "FATAL: sl3000 missing AFTER defconfig"
          exit 1
        fi
        echo "sl3000 config OK"

    - name: Build firmware
      run: |
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        ccache -C || true

        echo "===== 编译固件（失败自动重试）====="
        make -j$(nproc) V=s || make -j1 V=s

        df -h
        ccache -s || true

    - name: Generate SHA256 checksums
      run: |
        cd bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "sl3000-${{ github.run_number }}"
        name: "SL3000 Firmware Build #${{ github.run_number }}"
        body: |
          自动构建固件（SL3000 / ImmortalWrt 24.10）
          ✔ 三件套自动检测（config / mk / DTS）
          ✔ DTS 自动检查（mt7981b-soc / memory / mmc / spi / eth / switch / leds / keys）
          ✔ config 自动修复
          ✔ defconfig 强校验
          ✔ 编译失败自动重试
          ✔ 自动生成 SHA256
          ✔ 自动发布 Release
        files: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS