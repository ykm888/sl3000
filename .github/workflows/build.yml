name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: immortalwrt-24.10

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3 python3-pip python3-setuptools ccache perl pkg-config \
          libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Clean build cache
      run: |
        make clean || true
        rm -rf tmp/ staging_dir/ build_dir/

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: dl
        key: "dl-${{ runner.os }}"
        restore-keys: |
          dl-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: "ccache-${{ runner.os }}-${{ github.run_id }}"
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Patch auto-check (安全模式)
      run: |
        set -e
        PATCH_DIR="target/linux/mediatek/patches-6.6"

        echo "===== 自动检测 patch 是否兼容 ====="
        if [ -d "$PATCH_DIR" ]; then
          for p in "$PATCH_DIR"/*.patch; do
            [ -e "$p" ] || continue
            patch -p1 --dry-run < "$p" || {
              echo "Patch $p 不兼容，已禁用"
              mv "$p" "$p.disabled"
            }
          done
        fi

    - name: Feeds update & cleanup
      run: |
        echo "===== feeds 更新 ====="
        ./scripts/feeds update -a
        ./scripts/feeds install -a

        echo "===== 自动卸载坏包 ====="
        ./scripts/feeds uninstall exim onionshare-cli python-zope-event python-zope-interface python-gevent python-twisted || true

    - name: Defconfig & target assert
      run: |
        echo "===== defconfig ====="
        make defconfig

        echo "===== 校验 SL3000 目标 ====="
        grep -q "CONFIG_TARGET_MEDIATEK_FILOGIC_DEVICE_sl3000=y" .config || {
          echo "FATAL: sl3000 missing AFTER defconfig"
          exit 1
        }

    - name: Build firmware
      run: |
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        ccache -C || true

        echo "===== 编译固件（失败自动重试）====="
        make -j$(nproc) V=s || make -j1 V=s

        df -h
        ccache -s || true

    - name: Generate SHA256 checksums
      run: |
        cd bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "sl3000-${{ github.run_number }}"
        name: "SL3000 Firmware Build #${{ github.run_number }}"
        body: |
          自动构建固件（SL3000 / ImmortalWrt 24.10）
          ✅ DTS / MK / .config 已手工对齐，无需 CI 自动修复
          ✅ patch 自动检测并禁用不兼容项
          ✅ feeds 自动卸载坏包
          ✅ defconfig 后强校验目标设备
          ✅ 编译失败自动重试
          ✅ 缓存加速（dl + ccache）
          ✅ 自动生成 SHA256 校验文件
          ✅ 自动发布 GitHub Release
        files: |
          bin/targets/mediatek/filogic/*
          bin/targets/mediatek/filogic/SHA256SUMS