name: Build SL3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: immortalwrt-24.10

    - name: Free disk space
      run: |
        sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc /opt/hostedtoolcache
        sudo docker system prune -af || true
        sudo apt clean
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
          file wget python3 python3-pip python3-setuptools ccache perl pkg-config \
          libelf-dev libncursesw5-dev parted e2fsprogs
        pip3 install --upgrade pip setuptools wheel

    - name: Clone ImmortalWrt
      run: |
        rm -rf /home/runner/immortalwrt
        git clone --depth=1 https://github.com/immortalwrt/immortalwrt.git \
          -b openwrt-24.10 /home/runner/immortalwrt

    - name: Copy SL3000 config/dts/mk
      run: |
        cp -f "$GITHUB_WORKSPACE/.config" /home/runner/immortalwrt/.config || true
        cp -f "$GITHUB_WORKSPACE/target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/mt7981b-sl3000-emmc.dts" \
              /home/runner/immortalwrt/target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/ || true
        cp -f "$GITHUB_WORKSPACE/target/linux/mediatek/image/filogic.mk" \
              /home/runner/immortalwrt/target/linux/mediatek/image/ || true

    - name: Cache dl
      uses: actions/cache@v4
      with:
        path: /home/runner/immortalwrt/dl
        key: "dl-${{ runner.os }}"
        restore-keys: |
          dl-

    - name: Cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: "ccache-${{ runner.os }}-${{ github.run_id }}"
        restore-keys: |
          ccache-${{ runner.os }}-

    - name: Patch auto-check + SL3000 prepare
      run: |
        set -e
        cd /home/runner/immortalwrt

        echo "===== 自动检测 patch 是否兼容 ====="
        for p in target/linux/mediatek/patches-6.6/*.patch; do
          patch -p1 --dry-run < "$p" || {
            echo "Patch $p 不兼容，已禁用"
            mv "$p" "$p.disabled"
          }
        done

        echo "===== DTS 自动注册 ====="
        DTS_FILE="target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/mt7981b-sl3000-emmc.dts"
        DTS_MK="target/linux/mediatek/files-6.6/arch/arm64/boot/dts/mediatek/Makefile"
        grep -q "mt7981b-sl3000-emmc.dtb" "$DTS_MK" || echo "dtb-y += mt7981b-sl3000-emmc.dtb" >> "$DTS_MK"

        echo "===== MK 自动补齐 ====="
        MK_FILE="target/linux/mediatek/image/filogic.mk"
        grep -q "define Device/sl3000" "$MK_FILE" || {
          echo "define Device/sl3000" >> "$MK_FILE"
          echo "  DEVICE_VENDOR := SL" >> "$MK_FILE"
          echo "  DEVICE_MODEL := 3000" >> "$MK_FILE"
          echo "  DEVICE_DTS := mt7981b-sl3000-emmc" >> "$MK_FILE"
          echo "  IMAGE_SIZE := 268435456" >> "$MK_FILE"
          echo "endef" >> "$MK_FILE"
          echo "TARGET_DEVICES += sl3000" >> "$MK_FILE"
        }

        echo "===== feeds 更新 + 自动卸载坏包 ====="
        ./scripts/feeds update -a || exit 1
        ./scripts/feeds install -a || exit 1
        ./scripts/feeds uninstall exim onionshare-cli python-zope-event python-zope-interface || true

        echo "===== 强制目标与设备 ====="
        grep -q "CONFIG_TARGET_mediatek=y" .config || echo "CONFIG_TARGET_mediatek=y" >> .config
        grep -q "CONFIG_TARGET_mediatek_filogic=y" .config || echo "CONFIG_TARGET_mediatek_filogic=y" >> .config
        grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" .config || echo "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" >> .config

        echo "===== defconfig 前后双断言 ====="
        make defconfig
        grep -q "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" .config || {
          echo "FATAL: sl3000 missing AFTER defconfig，已兜底修复"
          echo "CONFIG_TARGET_mediatek_filogic_DEVICE_sl3000=y" >> .config
          make defconfig
        }

    - name: Build firmware
      run: |
        cd /home/runner/immortalwrt
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        ccache -C || true

        echo "===== 编译固件，失败自动重试 ====="
        make -j$(nproc) V=s || make -j1 V=s

        df -h
        ccache -s || true

    - name: Generate SHA256 checksums
      run: |
        cd /home/runner/immortalwrt/bin/targets/mediatek/filogic/ || exit 0
        sha256sum * > SHA256SUMS || true
        cat SHA256SUMS || true

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: |
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/*
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/SHA256SUMS

    - name: Release firmware
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "sl3000-${{ github.run_number }}"
        name: "SL3000 Firmware Build #${{ github.run_number }}"
        body: |
          自动构建固件（SL3000 / ImmortalWrt 24.10）
          ✅ 自动验证并修复三件套（.config/DTS/MK）
          ✅ DTS 自动注册 + MK 自动补齐
          ✅ patch 自动检测并禁用不兼容项
          ✅ feeds 自动卸载坏包
          ✅ defconfig 前后双断言防止回落
          ✅ 编译失败自动重试
          ✅ 自动生成 SHA256 校验文件
        files: |
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/*
          /home/runner/immortalwrt/bin/targets/mediatek/filogic/SHA256SUMS